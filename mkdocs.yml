site_name: AI-First Software Engineering Notebook
site_description: A structured knowledge base documenting my journey of becoming a strong AI-first software engineer.
site_author: Gaurav Goyal
theme:
  name: material
  features:
    - content.code.copy

nav:
  - Welcome: "README.md"
  - 1. Programming Foundations: "01-programming-foundations/index.md"
  - 2. Python Backend Engineering:
      - "Fundamentals": "02-python-backend-engineering/01-python-fundamentals.md"
      - "Object Oriented Programming": "02-python-backend-engineering/02-object-oriented-programming.md"
      - "Web Fundamentals": "02-python-backend-engineering/03-web-fundamentals.md"
      - "Django Architecture": "02-python-backend-engineering/04-django-architecture.md"
      - "REST APIs": "02-python-backend-engineering/05-rest-apis.md"
      - "Django ORM": "02-python-backend-engineering/06-django-orm.md"
      - "Auth & Security": "02-python-backend-engineering/07-authentication-security.md"
      - "Testing & Reliability": "02-python-backend-engineering/08-testing-reliability.md"
      - "Async Programming": "02-python-backend-engineering/09-async-programming.md"
      - "Production & Deployment": "02-python-backend-engineering/10-production-deployment.md"
  - 3. Frontend Engineering:
      - "HTML": "03-frontend-engineering/01-html.md"
      - "CSS": "03-frontend-engineering/02-css.md"
      - "JavaScript": "03-frontend-engineering/03-javascript.md"
      - "React": "03-frontend-engineering/04-react.md"
      - "State Management": "03-frontend-engineering/05-state-management.md"
      - "Performance Optimization": "03-frontend-engineering/06-performance-optimization.md"
  - 4. Databases: "04-databases/index.md"
  - 5. Low Level Design: "05-low-level-design/index.md"
  - 6. Design Patterns: "06-design-patterns/index.md"
  - 7. Backend Architecture: "07-backend-architecture/index.md"
  - 8. Frontend System Design:
      - "Component Architecture": "08-frontend-system-design/01-component-architecture.md"
      - "Rendering Strategies": "08-frontend-system-design/02-rendering-strategies.md"
      - "Frontend Performance": "08-frontend-system-design/03-frontend-performance.md"
      - "Micro Frontends": "08-frontend-system-design/04-micro-frontends.md"
      - "CDN and Caching": "08-frontend-system-design/05-cdn-and-caching.md"
  - 9. System Design: "09-system-design/index.md"
  - 10. Distributed Systems: "10-distributed-systems/index.md"
  - 11. AI for Software Engineering: "11-ai-for-software-engineering/index.md"
  - 12. DevOps: "12-devops/index.md"
  - 13. DSA: "13-dsa/index.md"
  - 14. System Case Studies: "14-system-case-studies/index.md"
  - 15. Engineering Notes: "15-engineering-notes/index.md"
  - Archived:
      - "Node.js Backend": "archived/03-nodejs-backend-engineering/01-node-fundamentals.md"
      - "Java Backend": "archived/04-java-backend-engineering/01-java-fundamentals.md"

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
