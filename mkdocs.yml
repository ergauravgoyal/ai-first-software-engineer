  - 1. Programming Foundations: "01-programming-foundations/index.md"
  - 2. Backend Engineering:
      - Python:
          - "Fundamentals": "02-backend-engineering/python/01-python-fundamentals.md"
          - "Object Oriented Programming": "02-backend-engineering/python/02-object-oriented-programming.md"
          - "Web Fundamentals": "02-backend-engineering/python/03-web-fundamentals.md"
          - "Django Architecture": "02-backend-engineering/python/04-django-architecture.md"
          - "REST APIs": "02-backend-engineering/python/05-rest-apis.md"
          - "Django ORM": "02-backend-engineering/python/06-django-orm.md"
          - "Auth & Security": "02-backend-engineering/python/07-authentication-security.md"
          - "Testing & Reliability": "02-backend-engineering/python/08-testing-reliability.md"
          - "Async Programming": "02-backend-engineering/python/09-async-programming.md"
          - "Production & Deployment": "02-backend-engineering/python/10-production-deployment.md"
      - Node.js:
          - "Node Fundamentals": "02-backend-engineering/nodejs/01-node-fundamentals.md"
          - "Express": "02-backend-engineering/nodejs/02-express.md"
          - "REST APIs": "02-backend-engineering/nodejs/03-rest-apis.md"
          - "Authentication": "02-backend-engineering/nodejs/04-authentication.md"
          - "Testing": "02-backend-engineering/nodejs/05-testing.md"
          - "Deployment": "02-backend-engineering/nodejs/06-deployment.md"
      - Java:
          - "Java Fundamentals": "02-backend-engineering/java/01-java-fundamentals.md"
          - "Spring Boot": "02-backend-engineering/java/02-spring-boot.md"
          - "REST APIs": "02-backend-engineering/java/03-rest-apis.md"
          - "Authentication": "02-backend-engineering/java/04-authentication.md"
          - "Testing": "02-backend-engineering/java/05-testing.md"
          - "Deployment": "02-backend-engineering/java/06-deployment.md"
  - 3. Frontend Engineering:
      - "HTML": "03-frontend-engineering/01-html.md"
      - "CSS": "03-frontend-engineering/02-css.md"
      - "JavaScript": "03-frontend-engineering/03-javascript.md"
      - "React": "03-frontend-engineering/04-react.md"
      - "State Management": "03-frontend-engineering/05-state-management.md"
      - "Performance Optimization": "03-frontend-engineering/06-performance-optimization.md"
  - 4. Databases: "04-databases/index.md"
  - 5. Low Level Design: "05-low-level-design/index.md"
  - 6. Design Patterns: "06-design-patterns/index.md"
  - 7. Backend Architecture: "07-backend-architecture/index.md"
  - 8. Frontend System Design:
      - "Component Architecture": "08-frontend-system-design/01-component-architecture.md"
      - "Rendering Strategies": "08-frontend-system-design/02-rendering-strategies.md"
      - "Frontend Performance": "08-frontend-system-design/03-frontend-performance.md"
      - "Micro Frontends": "08-frontend-system-design/04-micro-frontends.md"
      - "CDN and Caching": "08-frontend-system-design/05-cdn-and-caching.md"
  - 9. System Design: "09-system-design/index.md"
  - 10. Distributed Systems: "10-distributed-systems/index.md"
  - 11. AI for Software Engineering: "11-ai-for-software-engineering/index.md"
  - 12. DevOps: "12-devops/index.md"
  - 13. DSA:
      - "Introduction to Algorithms & Sorting": "13-dsa/01-introduction-to-algorithms-and-sorting.md"
  - 14. System Case Studies: "14-system-case-studies/index.md"
  - 15. Engineering Notes: "15-engineering-notes/index.md"

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
