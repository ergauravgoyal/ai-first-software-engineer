{% extends "base.html" %} {% block extrahead %}
<style>
  .supabase-auth-btn {
    margin-left: 10px;
    padding: 5px 15px;
    border-radius: 4px;
    border: 1px solid var(--md-typeset-color);
    background: transparent;
    color: inherit;
    cursor: pointer;
    font-size: 0.7rem;
    vertical-align: middle;
    transition: all 0.2s;
  }
  .supabase-auth-btn:hover {
    background: var(--md-accent-fg-color--transparent);
    border-color: var(--md-accent-fg-color);
  }
  .auth-container {
    display: flex;
    align-items: center;
  }
  #user-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    margin-left: 10px;
    display: none;
  }
</style>
{% endblock %} {% block header %} {{ super() }}
<!-- The login button will be moved into the header via JS to avoid complex Jinja overrides -->
<div id="auth-portal" style="display: none">
  <button id="login-btn" class="supabase-auth-btn">Sign In</button>
  <button id="logout-btn" class="supabase-auth-btn" style="display: none">
    Sign Out
  </button>
  <img id="user-avatar" src="" alt="User Avatar" />
</div>
{% endblock %}
